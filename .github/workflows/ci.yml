name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flake8 python-dotenv requests azure-storage-blob

      - name: Lint with flake8
        run: |
          flake8 ingestion/ --max-line-length=100

      - name: Check Python syntax
        run: |
          python -m py_compile ingestion/gtfs_downloader.py
          echo "Syntax check passed"